<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Data List</title>

<!-- SheetJS（Excel 出力用） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #007aff;
  --bg: #f2f2f7;
  --card-bg: #ffffff;
  --border-radius: 14px;
}
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg);
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--card-bg);
  padding: 12px 16px;
  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  font-weight: 600;
}
.main {
  padding: 12px;
  padding-bottom: 72px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 10px 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-bottom: 4px;
}
.badge {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  background: #e5e5ea;
}
.badge.receipt { background: #ffe5cc; }
.badge.business_card { background: #e0f0ff; }
.badge.license_plate { background: #e5ffe0; }
textarea {
  width: 100%;
  min-height: 80px;
  border-radius: 10px;
  border: 1px solid #d1d1d6;
  padding: 6px 8px;
  font-size: 12px;
  box-sizing: border-box;
}
button {
  border-radius: 999px;
  border: none;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-danger {
  background: #ff3b30;
  color: #fff;
}
.controls {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.controls input, .controls select {
  flex: 1;
  padding: 6px 8px;
  border-radius: 10px;
  border: 1px solid #d1d1d6;
  font-size: 13px;
}
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--card-bg);
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 12px;
}
.nav-item {
  text-align: center;
  color: #8e8e93;
  text-decoration: none;
}
.nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.nav-item span {
  display: block;
}
</style>
</head>
<body>
<header>データ一覧</header>

<div class="main">

  <div class="controls">
    <select id="filterType">
      <option value="">すべて</option>
      <option value="receipt">レシート</option>
      <option value="business_card">名刺</option>
      <option value="license_plate">ナンバープレート</option>
    </select>
    <input type="text" id="searchText" placeholder="キーワード検索">
  </div>

  <div class="controls">
    <button class="btn-outline" id="excelBtn">Excel 出力</button>
    <button class="btn-outline" id="clearBtn">全削除</button>
  </div>

  <div id="listContainer"></div>

</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>📷</span>
    <span>キャプチャ</span>
  </a>
  <a href="data.html" class="nav-item active">
    <span>📂</span>
    <span>データ一覧</span>
  </a>
</div>

<script>
let dataList = [];

function loadData() {
  dataList = JSON.parse(localStorage.getItem("ocrData") || "[]");
  renderList();
}

function renderList() {
  const container = document.getElementById("listContainer");
  container.innerHTML = "";

  const typeFilter = document.getElementById("filterType").value;
  const keyword = document.getElementById("searchText").value.trim();

  const filtered = dataList.filter(item => {
    if (typeFilter && item.type !== typeFilter) return false;
    if (keyword && !item.data.toLowerCase().includes(keyword.toLowerCase())) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = "<p style='font-size:13px;color:#888;'>データがありません。</p>";
    return;
  }

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const left = document.createElement("div");
    left.textContent = new Date(item.time).toLocaleString();

    const badge = document.createElement("span");
    badge.className = "badge " + item.type;
    badge.textContent =
      item.type === "receipt" ? "レシート" :
      item.type === "business_card" ? "名刺" :
      item.type === "license_plate" ? "ナンバー" : item.type;

    header.appendChild(left);
    header.appendChild(badge);

    const textarea = document.createElement("textarea");
    textarea.value = item.data || "";

    const btnRow = document.createElement("div");
    btnRow.style.display = "flex";
    btnRow.style.justifyContent = "flex-end";
    btnRow.style.gap = "6px";
    btnRow.style.marginTop = "6px";

    const saveBtn = document.createElement("button");
    saveBtn.className = "btn-primary";
    saveBtn.textContent = "保存";
    saveBtn.onclick = () => {
      item.data = textarea.value;
      localStorage.setItem("ocrData", JSON.stringify(dataList));
      alert("更新しました");
    };

    const delBtn = document.createElement("button");
    delBtn.className = "btn-danger";
    delBtn.textContent = "削除";
    delBtn.onclick = () => {
      if (!confirm("このデータを削除しますか？")) return;
      dataList = dataList.filter(d => d.id !== item.id);
      localStorage.setItem("ocrData", JSON.stringify(dataList));
      loadData();
    };

    btnRow.appendChild(saveBtn);
    btnRow.appendChild(delBtn);

    card.appendChild(header);
    card.appendChild(textarea);
    card.appendChild(btnRow);

    container.appendChild(card);
  });
}

document.getElementById("filterType").onchange = renderList;
document.getElementById("searchText").oninput = renderList;

/* Excel 出力（SheetJS） */
document.getElementById("excelBtn").onclick = () => {
  if (dataList.length === 0) {
    alert("データがありません");
    return;
  }
  const rows = dataList.map(item => ({
    id: item.id,
    type: item.type,
    time: new Date(item.time).toLocaleString(),
    data: item.data
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "OCR Data");
  XLSX.writeFile(wb, "ocr_data.xlsx");
};

/* 全削除 */
document.getElementById("clearBtn").onclick = () => {
  if (!confirm("すべてのデータを削除しますか？")) return;
  localStorage.removeItem("ocrData");
  loadData();
};

loadData();
</script>
</body>
</html>
