<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Data List</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #007aff;
  --bg: #f2f2f7;
  --card-bg: #ffffff;
  --radius: 12px;
  --text-main: #1c1c1e;
  --text-sub: #8e8e93;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg);
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  padding: 16px;
  text-align: center;
  font-weight: 600;
  font-size: 17px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}
.main {
  padding: 16px;
  padding-bottom: 80px;
  max-width: 600px;
  margin: 0 auto;
}

/* 上部コントロールエリア */
.controls-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.search-row input, .search-row select {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #e5e5ea;
  font-size: 14px;
  background: #f9f9fb;
}
.action-row {
  display: flex;
  gap: 12px;
}
button {
  border-radius: 10px;
  border: none;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  flex: 1;
}
button:active { opacity: 0.7; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-danger { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; }

/* リスト表示 (カード型) */
.list-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.list-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}
.badge.receipt { background: #fff0e0; color: #d97706; }
.badge.business_card { background: #e0f0ff; color: #005bb5; }
.badge.license_plate { background: #e5ffe0; color: #1e7e34; }
.time-text {
  font-size: 12px;
  color: var(--text-sub);
}
.list-card-body {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}
.thumb {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid #e5e5ea;
  flex-shrink: 0;
}
.summary-text {
  font-size: 14px;
  line-height: 1.5;
  word-break: break-all;
}
.summary-title { font-weight: 600; margin-bottom: 4px; }
.summary-sub { color: var(--text-sub); font-size: 13px; }

.list-card-actions {
  display: flex;
  gap: 12px;
  border-top: 1px solid #f2f2f7;
  padding-top: 12px;
}

.json-editor {
  width: 100%;
  min-height: 150px;
  border-radius: 8px;
  border: 1px solid #d1d1d6;
  padding: 10px;
  font-size: 13px;
  font-family: monospace;
  background: #f9f9fb;
}

/* ナビ・モーダル */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { text-align: center; color: var(--text-sub); text-decoration: none; width: 100%; padding: 8px 0; }
.nav-item.active { color: var(--primary); }
.nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
.nav-text { font-size: 11px; font-weight: 500; }

#imageModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; }
#imageModal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<header>データ一覧</header>

<div class="main">

  <div class="controls-card">
    <div class="search-row">
      <select id="filterType">
        <option value="">🏷 すべて</option>
        <option value="receipt">レシート</option>
        <option value="business_card">名刺</option>
        <option value="license_plate">ナンバー</option>
      </select>
      <input type="text" id="searchText" placeholder="🔍 店名・品名で検索">
    </div>
    <div class="action-row">
      <button class="btn-primary" id="excelBtn">📊 Excel 出力</button>
      <button class="btn-danger" id="clearBtn">🗑 全削除</button>
    </div>
  </div>

  <div id="listContainer"></div>

</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="nav-icon">📷</span>
    <span class="nav-text">キャプチャ</span>
  </a>
  <a href="data.html" class="nav-item active">
    <span class="nav-icon">📂</span>
    <span class="nav-text">データ一覧</span>
  </a>
</div>

<div id="imageModal">
  <img id="modalImage" src="">
</div>

<script>
let dataList = [];

function loadData() {
  dataList = JSON.parse(localStorage.getItem("ocrData") || "[]");
  renderList();
}

function renderList() {
  const container = document.getElementById("listContainer");
  container.innerHTML = "";

  const typeFilter = document.getElementById("filterType").value;
  const keyword = document.getElementById("searchText").value.trim();

  const filtered = dataList.filter(item => {
    if (typeFilter && item.type !== typeFilter) return false;
    const text = (item.raw || "") + " " + JSON.stringify(item.json || {});
    if (keyword && !text.toLowerCase().includes(keyword.toLowerCase())) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = "<div style='text-align:center; padding: 40px 20px; color: #8e8e93;'><span style='font-size:32px; display:block; margin-bottom:12px;'>📭</span>保存されたデータがありません</div>";
    return;
  }

  // カード形式でリストを描画
  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "list-card";

    // Header (バッジと日時)
    const header = document.createElement("div");
    header.className = "list-card-header";
    
    let typeText = item.type;
    if(item.type === "receipt") typeText = "🧾 レシート";
    if(item.type === "business_card") typeText = "📇 名刺";
    if(item.type === "license_plate") typeText = "🚗 ナンバー";
    
    header.innerHTML = `
      <span class="badge ${item.type}">${typeText}</span>
      <span class="time-text">${new Date(item.time).toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
    `;
    card.appendChild(header);

    // Body (画像と概要)
    const body = document.createElement("div");
    body.className = "list-card-body";

    if (item.image && item.image.startsWith("data:image")) {
      const img = document.createElement("img");
      img.src = item.image;
      img.className = "thumb";
      img.onclick = () => openImageModal(item.image);
      body.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "thumb";
      ph.style.display = "flex"; ph.style.alignItems = "center"; ph.style.justifyContent = "center"; ph.style.background = "#f2f2f7"; ph.textContent = "No Img";
      body.appendChild(ph);
    }

    const summaryDiv = document.createElement("div");
    summaryDiv.className = "summary-text";

    if (item.type === "receipt" && item.json) {
      summaryDiv.innerHTML = `<div class="summary-title">${item.json.store_name || "(店名不明)"}</div><div class="summary-sub">合計: ¥${item.json.total_amount || 0}</div>`;
    } else if (item.type === "business_card" && item.json) {
      summaryDiv.innerHTML = `<div class="summary-title">${item.json.company || "(会社不明)"}</div><div class="summary-sub">${item.json.name || "(氏名不明)"}</div>`;
    } else if (item.type === "license_plate" && item.json) {
      summaryDiv.innerHTML = `<div class="summary-title">${item.json.region || ""} ${item.json.class_number || ""}</div><div class="summary-sub">${item.json.hiragana || ""} ${item.json.number || ""}</div>`;
    } else {
      summaryDiv.textContent = (item.raw || "").slice(0, 40) + "...";
    }
    body.appendChild(summaryDiv);
    card.appendChild(body);

    // Actions (ボタンエリア)
    const actions = document.createElement("div");
    actions.className = "list-card-actions";
    
    const editBtn = document.createElement("button");
    editBtn.className = "btn-outline";
    editBtn.textContent = "✏️ 編集";
    editBtn.onclick = () => openJsonEditor(item);
    
    const delBtn = document.createElement("button");
    delBtn.className = "btn-danger";
    delBtn.textContent = "🗑 削除";
    delBtn.onclick = () => {
      if (!confirm("このデータを削除しますか？")) return;
      dataList = dataList.filter(d => d.id !== item.id);
      localStorage.setItem("ocrData", JSON.stringify(dataList));
      loadData();
    };
    
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);

    container.appendChild(card);
  });
}

document.getElementById("filterType").onchange = renderList;
document.getElementById("searchText").oninput = renderList;

function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImage");
  img.src = src;
  modal.style.display = "flex";
}
document.getElementById("imageModal").onclick = () => {
  document.getElementById("imageModal").style.display = "none";
};

/* JSON 編集UI (インライン展開) */
function openJsonEditor(item) {
  const container = document.getElementById("listContainer");
  const editorWrapper = document.createElement("div");
  editorWrapper.className = "list-card";
  
  editorWrapper.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;">⚙️ データ編集</div>
      <button id="closeEditorBtn" style="width:auto; padding:6px 12px; background:#e5e5ea;">閉じる</button>
    </div>
    <textarea id="jsonEditorArea" class="json-editor"></textarea>
    <div id="editorWarning" style="color:#ff3b30;font-size:12px;margin:8px 0;font-weight:500;"></div>
    <button id="recalcBtn" class="btn-primary" style="margin-bottom:0;">💾 再計算して保存</button>
  `;

  container.innerHTML = "";
  container.appendChild(editorWrapper);

  const area = document.getElementById("jsonEditorArea");
  area.value = item.json ? JSON.stringify(item.json, null, 2) : (item.raw || "");

  document.getElementById("closeEditorBtn").onclick = () => renderList();

  document.getElementById("recalcBtn").onclick = () => {
    const warn = document.getElementById("editorWarning");
    warn.textContent = "";
    let obj;
    try {
      obj = JSON.parse(area.value);
    } catch (e) {
      warn.textContent = "⚠ JSON の形式が正しくありません: " + e.message;
      return;
    }

    if (item.type === "receipt") {
      const check = validateReceipt(obj);
      if (!check.ok) {
        warn.textContent = "⚠ 合計金額が一致しません（計算値: " + check.calcTotal + " / JSON: " + obj.total_amount + "）";
      } else {
        warn.textContent = "✅ 合計金額は一致しています。";
      }
    }
    item.json = obj;
    item.raw = JSON.stringify(obj, null, 2);
    localStorage.setItem("ocrData", JSON.stringify(dataList));
    setTimeout(() => { alert("保存しました"); renderList(); }, 100);
  };
}

function validateReceipt(json) {
  if (!json.items || !Array.isArray(json.items)) return { ok: true, calcTotal: 0 };
  let subtotal = 0;
  json.items.forEach(it => { 
  const qty = Number(it.qty || 0); 
  const unit = Number(it.unit_price || 0); 
  const disc = Number(it.discount || 0); // ★ 値引き額（discount）を数値として取得
  const sub = (qty * unit) - disc;       // ★ 単価×数量 から値引き額を差し引く
  it.subtotal = sub; 
  subtotal += sub; 
});
json.subtotal_amount = subtotal;
  const tax = Number(json.tax_amount || 0); const total = Number(json.total_amount || 0); const calcTotal = subtotal + tax; json.total_check = (calcTotal === total);
  return { ok: json.total_check, calcTotal };
}

/* Excel 出力（既存処理そのまま） */
document.getElementById("excelBtn").onclick = () => {
  if (dataList.length === 0) { alert("データがありません"); return; }
  const rowsKakeibo = []; const rowsReceipts = [];
  dataList.forEach(item => {
    if (item.type !== "receipt" || !item.json) return;
    const r = item.json;
    const check = validateReceipt(r);
    const date = r.date || ""; const store = r.store_name || ""; const pay = r.payment_method || ""; const total = r.total_amount || 0; const subtotal = r.subtotal_amount || 0; const tax = r.tax_amount || 0;
    const rate = subtotal > 0 ? Math.round((tax / subtotal) * 1000) / 10 : "";
    const items = Array.isArray(r.items) ? r.items : [];
    items.forEach(it => { rowsKakeibo.push({ 日付: date, 店名: store, カテゴリ: it.category || "", サブカテゴリ: it.subcategory || "", 品名: it.name || "", 数量: it.qty || 0, 単価: it.unit_price || 0, 小計: it.subtotal || 0, 支払い方法: pay, 合計金額: total, メモ: "" }); });
    rowsReceipts.push({ 日付: date, 店名: store, 支払い方法: pay, 小計: subtotal, 税額: tax, 税率_推定: rate, 合計金額: total, 合計チェック: r.total_check ? "OK" : "NG" });
  });
  if (rowsKakeibo.length === 0) { alert("レシートの JSON データがありません"); return; }
  const wb = XLSX.utils.book_new();
  const wsK = XLSX.utils.json_to_sheet(rowsKakeibo); XLSX.utils.book_append_sheet(wb, wsK, "家計簿");
  const wsR = XLSX.utils.json_to_sheet(rowsReceipts); XLSX.utils.book_append_sheet(wb, wsR, "レシート");
  XLSX.writeFile(wb, "kakeibo_receipts.xlsx");
};

document.getElementById("clearBtn").onclick = () => {
  if (!confirm("すべてのデータを削除しますか？")) return;
  localStorage.removeItem("ocrData");
  loadData();
};

loadData();
</script>
</body>
</html>
