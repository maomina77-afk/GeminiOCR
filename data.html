<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Data List</title>

<!-- SheetJS（Excel 出力用） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #007aff;
  --bg: #f2f2f7;
  --card-bg: #ffffff;
  --radius: 14px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg);
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--card-bg);
  padding: 12px 16px;
  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  font-weight: 600;
}
.main {
  padding: 12px;
  padding-bottom: 72px;
}
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.table thead {
  background: #e5e5ea;
}
.table th, .table td {
  padding: 6px 4px;
  border-bottom: 1px solid #ddd;
  vertical-align: top;
}
.badge {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  background: #e5e5ea;
}
.badge.receipt { background: #ffe5cc; }
.badge.business_card { background: #e0f0ff; }
.badge.license_plate { background: #e5ffe0; }
button {
  border-radius: 999px;
  border: none;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-danger {
  background: #ff3b30;
  color: #fff;
}
.controls {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.controls input, .controls select {
  flex: 1;
  padding: 6px 8px;
  border-radius: 10px;
  border: 1px solid #d1d1d6;
  font-size: 13px;
}
.thumb {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}
.json-editor {
  width: 100%;
  min-height: 120px;
  border-radius: 8px;
  border: 1px solid #d1d1d6;
  padding: 6px 8px;
  font-size: 11px;
  font-family: monospace;
}
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--card-bg);
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 12px;
}
.nav-item {
  text-align: center;
  color: #8e8e93;
  text-decoration: none;
}
.nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.nav-item span {
  display: block;
}

/* 画像拡大モーダル */
#imageModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
#imageModal img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 12px;
}
</style>
</head>
<body>
<header>データ一覧</header>

<div class="main">

  <div class="controls">
    <select id="filterType">
      <option value="">すべて</option>
      <option value="receipt">レシート</option>
      <option value="business_card">名刺</option>
      <option value="license_plate">ナンバープレート</option>
    </select>
    <input type="text" id="searchText" placeholder="キーワード検索（店名・品名など）">
  </div>

  <div class="controls">
    <button class="btn-outline" id="excelBtn">家計簿 Excel 出力</button>
    <button class="btn-outline" id="clearBtn">全削除</button>
  </div>

  <div id="listContainer"></div>

</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>📷</span>
    <span>キャプチャ</span>
  </a>
  <a href="data.html" class="nav-item active">
    <span>📂</span>
    <span>データ一覧</span>
  </a>
</div>

<!-- 画像拡大モーダル -->
<div id="imageModal">
  <img id="modalImage" src="">
</div>

<script>
let dataList = [];

function loadData() {
  dataList = JSON.parse(localStorage.getItem("ocrData") || "[]");
  renderList();
}

function renderList() {
  const container = document.getElementById("listContainer");
  container.innerHTML = "";

  const typeFilter = document.getElementById("filterType").value;
  const keyword = document.getElementById("searchText").value.trim();

  const filtered = dataList.filter(item => {
    if (typeFilter && item.type !== typeFilter) return false;
    const text = (item.raw || "") + " " + JSON.stringify(item.json || {});
    if (keyword && !text.toLowerCase().includes(keyword.toLowerCase())) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = "<p style='font-size:13px;color:#888;'>データがありません。</p>";
    return;
  }

  const table = document.createElement("table");
  table.className = "table";

  const thead = document.createElement("thead");
  thead.innerHTML = `
    <tr>
      <th>画像</th>
      <th>種別</th>
      <th>日時</th>
      <th>概要</th>
      <th>操作</th>
    </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  filtered.forEach(item => {
    const tr = document.createElement("tr");

    // 画像サムネイル
    const tdImg = document.createElement("td");
    if (item.image && item.image.startsWith("data:image")) {
      const img = document.createElement("img");
      img.src = item.image;
      img.className = "thumb";
      img.onclick = () => openImageModal(item.image);
      tdImg.appendChild(img);
    } else {
      tdImg.textContent = "-";
    }

    // 種別
    const tdType = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "badge " + item.type;
    badge.textContent =
      item.type === "receipt" ? "レシート" :
      item.type === "business_card" ? "名刺" :
      item.type === "license_plate" ? "ナンバー" : item.type;
    tdType.appendChild(badge);

    // 日時
    const tdTime = document.createElement("td");
    tdTime.textContent = new Date(item.time).toLocaleString();

// 概要（種別ごとに最適化）
const tdSummary = document.createElement("td");

if (item.type === "receipt" && item.json) {
  // レシート：店名 / 合計
  const r = item.json;
  const store = r.store_name || "(店名不明)";
  const total = r.total_amount != null ? r.total_amount : "";
  tdSummary.textContent = `${store} / 合計: ${total}`;

} else if (item.type === "business_card" && item.json) {
  // 名刺：会社名 / 氏名
  const r = item.json;
  const company = r.company || "(会社不明)";
  const name = r.name || "(氏名不明)";
  tdSummary.textContent = `${company} / ${name}`;

} else if (item.type === "license_plate" && item.json) {
  // ナンバー：地域＋分類番号 / ひらがな＋番号
  const r = item.json;
  const region = r.region || "";
  const classNum = r.class_number || "";
  const hira = r.hiragana || "";
  const num = r.number || "";
  tdSummary.textContent = `${region} ${classNum} / ${hira} ${num}`;

} else {
  // その他 or JSONなし
  tdSummary.textContent = (item.raw || "").slice(0, 60);
}


    // 操作
    const tdOps = document.createElement("td");
    const editBtn = document.createElement("button");
    editBtn.className = "btn-outline";
    editBtn.textContent = "JSON編集";
    editBtn.onclick = () => openJsonEditor(item);
    const delBtn = document.createElement("button");
    delBtn.className = "btn-danger";
    delBtn.style.marginLeft = "4px";
    delBtn.textContent = "削除";
    delBtn.onclick = () => {
      if (!confirm("このデータを削除しますか？")) return;
      dataList = dataList.filter(d => d.id !== item.id);
      localStorage.setItem("ocrData", JSON.stringify(dataList));
      loadData();
    };
    tdOps.appendChild(editBtn);
    tdOps.appendChild(delBtn);

    tr.appendChild(tdImg);
    tr.appendChild(tdType);
    tr.appendChild(tdTime);
    tr.appendChild(tdSummary);
    tr.appendChild(tdOps);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

document.getElementById("filterType").onchange = renderList;
document.getElementById("searchText").oninput = renderList;

/* 画像モーダル */
function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImage");
  img.src = src;
  modal.style.display = "flex";
}
document.getElementById("imageModal").onclick = () => {
  document.getElementById("imageModal").style.display = "none";
};

/* JSON 編集モーダル風（簡易） */
function openJsonEditor(item) {
  const container = document.getElementById("listContainer");
  const editorWrapper = document.createElement("div");
  editorWrapper.style.marginTop = "10px";

  editorWrapper.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:10px;border:1px solid #ddd;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-size:13px;font-weight:600;">JSON 編集 / 再計算</div>
        <button id="closeEditorBtn" class="btn-outline">閉じる</button>
      </div>
      <textarea id="jsonEditorArea" class="json-editor"></textarea>
      <div style="margin-top:6px;display:flex;justify-content:flex-end;gap:6px;">
        <button id="recalcBtn" class="btn-primary">再計算して保存</button>
      </div>
      <div id="editorWarning" style="color:#ff3b30;font-size:11px;margin-top:4px;"></div>
    </div>
  `;

  container.innerHTML = "";
  container.appendChild(editorWrapper);

  const area = document.getElementById("jsonEditorArea");
  area.value = item.json ? JSON.stringify(item.json, null, 2) : (item.raw || "");

  document.getElementById("closeEditorBtn").onclick = () => {
    renderList();
  };

  document.getElementById("recalcBtn").onclick = () => {
    const warn = document.getElementById("editorWarning");
    warn.textContent = "";
    let obj;
    try {
      obj = JSON.parse(area.value);
    } catch (e) {
      warn.textContent = "JSON の形式が正しくありません: " + e.message;
      return;
    }

    // レシートなら再計算
    if (item.type === "receipt") {
      const check = validateReceipt(obj);
      if (!check.ok) {
        warn.textContent = "⚠ 合計金額が一致しません（計算値: " +
          check.calcTotal + " / JSON: " + obj.total_amount + "）";
      } else {
        warn.textContent = "✅ 合計金額は一致しています。";
      }
    }

    item.json = obj;
    item.raw = JSON.stringify(obj, null, 2);
    localStorage.setItem("ocrData", JSON.stringify(dataList));
    alert("保存しました");
  };
}

/* レシート検証（index.html と同じロジック） */
function validateReceipt(json) {
  if (!json.items || !Array.isArray(json.items)) return { ok: true, calcTotal: 0 };
  let subtotal = 0;
  json.items.forEach(it => {
    const qty = Number(it.qty || 0);
    const unit = Number(it.unit_price || 0);
    const sub = qty * unit;
    it.subtotal = sub;
    subtotal += sub;
  });
  json.subtotal_amount = subtotal;
  const tax = Number(json.tax_amount || 0);
  const total = Number(json.total_amount || 0);
  const calcTotal = subtotal + tax;
  json.total_check = (calcTotal === total);
  return { ok: json.total_check, calcTotal };
}

/* 家計簿 Excel 出力（2シート：家計簿 / レシート） */
document.getElementById("excelBtn").onclick = () => {
  if (dataList.length === 0) {
    alert("データがありません");
    return;
  }

  const rowsKakeibo = [];
  const rowsReceipts = [];

  dataList.forEach(item => {
    if (item.type !== "receipt" || !item.json) return;
    const r = item.json;
    // 再計算しておく
    const check = validateReceipt(r);

    const date = r.date || "";
    const store = r.store_name || "";
    const pay = r.payment_method || "";
    const total = r.total_amount || 0;
    const subtotal = r.subtotal_amount || 0;
    const tax = r.tax_amount || 0;
    const rate = subtotal > 0 ? Math.round((tax / subtotal) * 1000) / 10 : "";

    const items = Array.isArray(r.items) ? r.items : [];

    // 家計簿シート（1行＝1品目）
    items.forEach(it => {
      rowsKakeibo.push({
        日付: date,
        店名: store,
        カテゴリ: it.category || "",
        サブカテゴリ: it.subcategory || "",
        品名: it.name || "",
        数量: it.qty || 0,
        単価: it.unit_price || 0,
        小計: it.subtotal || 0,
        支払い方法: pay,
        合計金額: total,
        メモ: ""
      });
    });

    // レシートシート（1行＝1レシート）
    rowsReceipts.push({
      日付: date,
      店名: store,
      支払い方法: pay,
      小計: subtotal,
      税額: tax,
      税率_推定: rate, // 例: 10.0 なら 10%
      合計金額: total,
      合計チェック: r.total_check ? "OK" : "NG"
    });
  });

  if (rowsKakeibo.length === 0) {
    alert("レシートの JSON データがありません");
    return;
  }

  const wb = XLSX.utils.book_new();

  const wsK = XLSX.utils.json_to_sheet(rowsKakeibo);
  XLSX.utils.book_append_sheet(wb, wsK, "家計簿");

  const wsR = XLSX.utils.json_to_sheet(rowsReceipts);
  XLSX.utils.book_append_sheet(wb, wsR, "レシート");

  XLSX.writeFile(wb, "kakeibo_receipts.xlsx");
};

/* 全削除 */
document.getElementById("clearBtn").onclick = () => {
  if (!confirm("すべてのデータを削除しますか？")) return;
  localStorage.removeItem("ocrData");
  loadData();
};

loadData();
</script>
</body>
</html>
