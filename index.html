<script>
// ---------- 画面切り替え (SPA仕様) ----------
function switchPage(page) {
  if (page === 'capture') {
    document.getElementById('pageCapture').style.display = 'block';
    document.getElementById('pageData').style.display = 'none';
    document.getElementById('navCapture').classList.add('active');
    document.getElementById('navData').classList.remove('active');
    document.getElementById('headerTitle').textContent = 'OCR Capture';
  } else {
    document.getElementById('pageCapture').style.display = 'none';
    document.getElementById('pageData').style.display = 'block';
    document.getElementById('navCapture').classList.remove('active');
    document.getElementById('navData').classList.add('active');
    document.getElementById('headerTitle').textContent = 'データ一覧';
    loadData(); // ページ切り替え時に常に最新状態を読み込む
  }
}

// ---------- 暗号化・鍵処理 ----------
let cropper = null;
let lastImageDataUrl = null;
let lastParsedJson = null;
let dataList = [];

const KEY = "takahiro-receipt-key";
function xorEncrypt(str, key) { let res = ""; for (let i = 0; i < str.length; i++) { res += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return btoa(res); }
function xorDecrypt(enc, key) { try { const decoded = atob(enc); let res = ""; for (let i = 0; i < decoded.length; i++) { res += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return res; } catch { return ""; } }

// Gemini API
const apiKeyInput = document.getElementById("apiKeyInput");
const storedKeyEnc = localStorage.getItem("geminiApiKeyEnc");
if (storedKeyEnc) { apiKeyInput.value = "********"; }
apiKeyInput.addEventListener("copy", e => e.preventDefault());
apiKeyInput.addEventListener("cut", e => e.preventDefault());

document.getElementById("saveApiKeyBtn").onclick = () => {
  const val = apiKeyInput.value.trim();
  if (!val || val === "********") { alert("新しい Gemini APIキー を入力してください。"); return; }
  const enc = xorEncrypt(val, KEY);
  localStorage.setItem("geminiApiKeyEnc", enc);
  apiKeyInput.value = "********";
  alert("Gemini APIキーを保存しました");
};

function getApiKey() {
  const enc = localStorage.getItem("geminiApiKeyEnc");
  if (!enc) return "";
  return xorDecrypt(enc, KEY);
}

// 国税庁API
const ntaApiKeyInput = document.getElementById("ntaApiKey");
ntaApiKeyInput.value = localStorage.getItem("ntaApiKey") || "";

document.getElementById("saveNtaApiKeyBtn").onclick = () => {
  const key = ntaApiKeyInput.value.trim();
  if (key) {
    localStorage.setItem("ntaApiKey", key);
    alert("国税庁APIキーを保存しました");
  } else {
    localStorage.removeItem("ntaApiKey");
    alert("国税庁APIキーを削除しました");
  }
};

// ---------- 画像読み込みロジック ----------
document.getElementById("fileInput").addEventListener("change", e => { loadImage(e.target.files[0]); });
document.getElementById("cameraBtn").onclick = () => { document.getElementById("cameraInput").click(); };
document.getElementById("cameraInput").addEventListener("change", e => { loadImage(e.target.files[0]); });

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("imageToCrop");
    img.src = e.target.result;
    lastImageDataUrl = e.target.result;
    document.getElementById("cropArea").style.display = "block";
    document.getElementById("resultBox").innerText = "まだ結果はありません。";
    
    if (cropper) cropper.destroy();
    
    cropper = new Cropper(img, {
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.8,
      responsive: true,
      restore: true,
      guides: true,
      highlight: false,
      cropBoxMovable: true,
      cropBoxResizable: true,
      toggleDragModeOnDblclick: false,
    });
  };
  reader.readAsDataURL(file);
}

function createThumbnail(canvas, maxWidth = 200) {
  return new Promise((resolve) => {
    if (canvas.width <= maxWidth) {
      resolve(canvas.toDataURL("image/jpeg", 0.4));
      return;
    }
    const dstWidth = maxWidth;
    const dstHeight = canvas.height * (maxWidth / canvas.width);
    
    const thumbCanvas = document.createElement("canvas");
    thumbCanvas.width = dstWidth;
    thumbCanvas.height = dstHeight;
    const ctx = thumbCanvas.getContext("2d");
    ctx.drawImage(canvas, 0, 0, dstWidth, dstHeight);
    resolve(thumbCanvas.toDataURL("image/jpeg", 0.4));
  });
}

function toHalfWidth(str) {
  if (!str) return "";
  return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
      return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

/// ---------- 国税庁API連携の修正版 ----------
async function fetchOfficialCompanyName(tNumberRaw) {
  const apiKey = localStorage.getItem("ntaApiKey");

  }
  const normalizedT = "T" + numOnly;

    // URLのパラメータ順序を整理
    
    const url = `https://red-flower-f82f.maomina77.workers.dev?id=${apiKey}&number=${normalizedT}`;
const response = await fetch(url);
const data = await response.json();
alert(data.announcement[0].name);



    // レスポンスの構造を確認
    if (data && data.announcement && data.announcement.length > 0) {

// ---------- トリミング決定・OCR解析・自動保存 ----------
document.getElementById("cropOkBtn").onclick = async () => {
  if (!cropper) return;
  const apiKey = getApiKey();
  if (!apiKey) { alert("先に Gemini APIキー を入力・保存してください。"); return; }
  
  // 💡 実行ボタンのUI変更（処理中のフィードバック）
  const btn = document.getElementById("cropOkBtn");
  const originalBtnText = btn.textContent;
  btn.textContent = "⏳ 処理中...";
  btn.style.backgroundColor = "#ff9500"; // 処理中はオレンジ色に
  btn.disabled = true;

  const canvas = cropper.getCroppedCanvas();
  const base64ForOCR = canvas.toDataURL("image/jpeg", 0.85); // OCR用は高精度
  const thumbBase64 = await createThumbnail(canvas, 200);   // 保存用は軽量サムネイル
  
  const docType = document.getElementById("docType").value;
  document.getElementById("resultBox").innerText = "読取中...";
  
  try {
    const text = await callGeminiOCR(base64ForOCR, apiKey, docType);
    const json = extractJson(text);

    // 国税庁APIへの問い合わせと原因特定
    if (json && json.type === "receipt") {
      document.getElementById("resultBox").innerText = "読取完了。国税庁APIから正式社名を検索中...";
      
      const ntaResult = await fetchOfficialCompanyName(json.registration_number);
      if (ntaResult.success) {
        json.official_company_name = ntaResult.name;
      } else {
        // 取得失敗時は理由を書き込む
        json.official_company_name = `【取得失敗】${ntaResult.reason}`;
      }
    }

    lastParsedJson = json;
    const resultBox = document.getElementById("resultBox");
    const warn = document.getElementById("receiptWarning");
    warn.textContent = "";

    if (json) {
      if (docType === "receipt") {
        const check = validateReceipt(json);
        if (!check.ok) {
          warn.textContent = "⚠ 合計金額が一致しません（計算値: " + check.calcTotal + " / JSON: " + json.total_amount + "）";
        }
      }
      resultBox.innerHTML = highlightJson(JSON.stringify(json, null, 2));
    } else {
      resultBox.textContent = "JSON を抽出できませんでした。\n\n" + text;
    }

    // --- 自動保存の実行 (完全同期) ---
    const list = JSON.parse(localStorage.getItem("ocrData") || "[]");
    const id = Date.now().toString();
    const finalRaw = json ? JSON.stringify(json, null, 2) : text;
    
    list.push({ 
      id, 
      type: docType, 
      json: json || null, 
      raw: finalRaw, 
      time: Date.now(), 
      image: thumbBase64 || null 
    });

    try {
      localStorage.setItem("ocrData", JSON.stringify(list));
      alert("✅ データ一覧に自動保存しました。");
    } catch (storageError) {
      console.error("容量限界エラー対応:", storageError);
      alert("ブラウザの保存容量制限を回避するため、画像を省いてテキストのみ自動保存しました。古いデータを削除してください。");
      list[list.length - 1].image = null;
      localStorage.setItem("ocrData", JSON.stringify(list));
    }

  } catch (ocrError) {
    document.getElementById("resultBox").innerText = "エラーが発生しました:\n" + ocrError.message;
  } finally {
    // 💡 実行ボタンのUIを元の状態に戻す
    btn.textContent = originalBtnText;
    btn.style.backgroundColor = ""; // CSSのクラス設定に戻す
    btn.disabled = false;
  }
};

あなたはレシート解析の専門家です。以下の画像から情報を抽出し、次の JSON 形式だけを返してください。余計な文章は一切書かないでください。

}

【最重要：金額計算・消費税ルール（絶対に間違えないこと）】
- レシートには「[小計]や[合計]金額 と [％対象]金額合計が違う場合は外税、同じ場合は内税の2つのパターンが混在します。これらを絶対に混同しないでください。
- 各商品の単価(unit_price)は、レシートに記載されているそのままの数値を抽出してください。値引き(discount)がある場合は正の数で記入。
- 各商品の小計(subtotal)は、AIが必ず「(数量 × 単価) − 値引き」を計算して数値を算出してください。
- tax_amount（消費税額）には、レシートに明記されている「消費税額」または「軽税外・標準税等に対応する税額の合計」を正確に抽出して数値で入れてください。
- total_amount（合計金額）には、最終的に支払った「税込の総合計金額」を正確に抽出してください。

【その他の抽出ルール】
- store_name: レシートに記載の店舗名やブランド名（正式な長い会社名は不要、店舗固有の呼び名を優先）
- registration_number: "T"から始まる13桁の登録番号。ハイフン等は不要です。見つけたら全角・半角問わず抽出してください。
- 日付は YYYY-MM-DD 形式に統一
- 支払い方法は推定（例：クレジットカード / PayPay / 現金）

【カテゴリ分類ルール】
■ 食品 (生鮮 / 加工 / 飲料) ■ 日用品 (洗剤 / 紙類 / 雑貨) ■ 外食 (ファストフード / レストラン) ■ そのその他の分類 (ガソリン / 医療・薬 / 交通 / 娯楽 / 衣類 / 住居 / その他)
`;
}
function buildBusinessCardPrompt() { return `これは名刺の画像です。以下の JSON だけを返してください。\n\n{\n  "type": "business_card",\n  "name": "",\n  "company": "",\n  "title": "",\n  "phone": "",\n  "email": "",\n  "address": ""\n}\n\nJSON 以外の文章は書かないでください。`; }
function buildLicensePlatePrompt() { return `これは車のナンバープレートの画像です。以下の JSON だけを返してください。\n\n{\n  "type": "license_plate",\n  "region": "",\n  "class_number": "",\n  "hiragana": "",\n  "number": ""\n}\n\nJSON 以外の文章は書かないでください。`; }
function buildPrompt(docType) { if (docType === "receipt") return buildReceiptPrompt(); if (docType === "business_card") return buildBusinessCardPrompt(); if (docType === "license_plate") return buildLicensePlatePrompt(); return "画像から情報を JSON だけで返してください。"; }

async function callGeminiOCR(base64, apiKey, docType) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
  const prompt = buildPrompt(docType);
  const body = { contents: [{ parts: [ { text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64.split(",")[1] } } ] }] };
  const res = await fetch(url, { method: "POST", body: JSON.stringify(body) });
  if (!res.ok) throw new Error("Gemini APIエラー: " + res.statusText);
  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
}

function extractJson(text) { const match = text.match(/\{[\s\S]*\}/); if (!match) return null; try { return JSON.parse(match[0]); } catch { return null; } }
function highlightJson(json) { return json.replace(/"(.*?)":/g, '<span class="json-key">"$1"</span>:').replace(/"(.*?)"/g, '<span class="json-string">"$1"</span>').replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>').replace(/\b(null)\b/g, '<span class="json-null">$1</span>').replace(/\b([0-9]+)\b/g, '<span class="json-number">$1</span>'); }

function validateReceipt(json) {
  if (!json.items || !Array.isArray(json.items)) return { ok: true, calcTotal: 0 };
  let subtotal = 0;
  json.items.forEach(it => { 
    const qty = Number(it.qty || 0); 
    const unit = Number(it.unit_price || 0); 
    const disc = Number(it.discount || 0); 
    const sub = (qty * unit) - disc;       
    it.subtotal = sub; 
    subtotal += sub; 
  });
  json.subtotal_amount = subtotal;
  const tax = Number(json.tax_amount || 0);
  const total = Number(json.total_amount || 0);

  const taxInclusive =
    json.tax_inclusive === true ||
    json.tax_inclusive === "true" ||
    json.tax_inclusive === 1;

  const calcTotal = taxInclusive ? subtotal : subtotal + tax;

  json.total_check = (calcTotal === total);

  return { ok: json.total_check, calcTotal };
}

// ==================== 📂 データ一覧画面のコントロール ====================
function loadData() {
  dataList = JSON.parse(localStorage.getItem("ocrData") || "[]");
  renderList();
}

function renderList() {
  const container = document.getElementById("listContainer");
  container.innerHTML = "";

  const typeFilter = document.getElementById("filterType").value;
  const keyword = document.getElementById("searchText").value.trim();

  const filtered = dataList.filter(item => {
    if (typeFilter && item.type !== typeFilter) return false;
    const text = (item.raw || "") + " " + JSON.stringify(item.json || {});
    if (keyword && !text.toLowerCase().includes(keyword.toLowerCase())) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = "<div style='text-align:center; padding: 40px 20px; color: #8e8e93;'><span style='font-size:32px; display:block; margin-bottom:12px;'>📭</span>保存されたデータがありません</div>";
    return;
  }

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "list-card";

    const header = document.createElement("div");
    header.className = "list-card-header";
    
    let typeText = item.type;
    if(item.type === "receipt") typeText = "🧾 レシート";
    if(item.type === "business_card") typeText = "📇 名刺";
    if(item.type === "license_plate") typeText = "🚗 ナンバー";
    
    header.innerHTML = `
      <span class="badge ${item.type}">${typeText}</span>
      <span class="time-text">${new Date(item.time).toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
    `;
    card.appendChild(header);

    const body = document.createElement("div");
    body.className = "list-card-body";

    if (item.image && item.image.startsWith("data:image")) {
      const img = document.createElement("img");
      img.src = item.image;
      img.className = "thumb";
      img.onclick = () => openImageModal(item.image);
      body.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "thumb";
      ph.style.display = "flex"; ph.style.alignItems = "center"; ph.style.justifyContent = "center"; ph.style.background = "#f2f2f7"; ph.style.fontSize = "11px"; ph.style.color = "#8e8e93"; ph.textContent = "画像なし";
      body.appendChild(ph);
    }

    const summaryDiv = document.createElement("div");
    summaryDiv.className = "summary-text";

    if (item.type === "receipt" && item.json) {
      let displayName = "";
      const official = item.json.official_company_name;
      const store = item.json.store_name;

      // エラー文字列が含まれていない正常な正式社名がある場合
      if (official && !official.includes("【取得失敗】") && store) {
        displayName = `${official}（${store}）`;
      } else {
        displayName = official || store || "(店名不明)";
      }
      summaryDiv.innerHTML = `<div class="summary-title">${displayName}</div><div class="summary-sub">合計: ¥${item.json.total_amount || 0}</div>`;
    } else if (item.type === "business_card" && item.json) {
      summaryDiv.innerHTML = `<div class="summary-title">${item.json.company || "(会社不明)"}</div><div class="summary-sub">${item.json.name || "(氏名不明)"}</div>`;
    } else if (item.type === "license_plate" && item.json) {
      summaryDiv.innerHTML = `<div class="summary-title">${item.json.region || ""} ${item.json.class_number || ""}</div><div class="summary-sub">${item.json.hiragana || ""} ${item.json.number || ""}</div>`;
    } else {
      summaryDiv.textContent = (item.raw || "").slice(0, 40) + "...";
    }
    body.appendChild(summaryDiv);
    card.appendChild(body);

    const actions = document.createElement("div");
    actions.className = "list-card-actions";
    
    const editBtn = document.createElement("button");
    editBtn.className = "btn-outline";
    editBtn.textContent = "✏️ 編集";
    editBtn.onclick = () => openJsonEditor(item);
    
    const delBtn = document.createElement("button");
    delBtn.className = "btn-danger";
    delBtn.textContent = "🗑 削除";
    delBtn.onclick = () => {
      if (!confirm("このデータを削除しますか？")) return;
      dataList = dataList.filter(d => d.id !== item.id);
      localStorage.setItem("ocrData", JSON.stringify(dataList));
      loadData();
    };
    
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);

    container.appendChild(card);
  });
}

document.getElementById("filterType").onchange = renderList;
document.getElementById("searchText").oninput = renderList;

function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImage");
  img.src = src;
  modal.style.display = "flex";
}
document.getElementById("imageModal").onclick = () => {
  document.getElementById("imageModal").style.display = "none";
};

/* インラインデータ編集機能 */
function openJsonEditor(item) {
  const container = document.getElementById("listContainer");
  const editorWrapper = document.createElement("div");
  editorWrapper.className = "list-card";
  
  editorWrapper.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;">⚙️ データ編集</div>
      <button id="closeEditorBtn" style="width:auto; padding:6px 12px; background:#e5e5ea; border-radius:8px;">閉じる</button>
    </div>
    <textarea id="jsonEditorArea" class="json-editor"></textarea>
    <div id="editorWarning" style="color:#ff3b30;font-size:12px;margin:8px 0;font-weight:500;"></div>
    <button id="recalcBtn" class="btn-primary" style="margin-bottom:0;">💾 再計算して保存</button>
  `;

  container.innerHTML = "";
  container.appendChild(editorWrapper);

  const area = document.getElementById("jsonEditorArea");
  area.value = item.json ? JSON.stringify(item.json, null, 2) : (item.raw || "");

  document.getElementById("closeEditorBtn").onclick = () => renderList();

  document.getElementById("recalcBtn").onclick = () => {
    const warn = document.getElementById("editorWarning");
    warn.textContent = "";
    let obj;
    try {
      obj = JSON.parse(area.value);
    } catch (e) {
      warn.textContent = "⚠ JSON の形式が正しくありません: " + e.message;
      return;
    }

    if (item.type === "receipt") {
      const check = validateReceipt(obj);
      if (!check.ok) {
        warn.textContent = "⚠ 合計金額が一致しません（計算値: " + check.calcTotal + " / JSON: " + obj.total_amount + "）";
      } else {
        warn.textContent = "✅ 合計金額は一致しています。";
      }
    }
    item.json = obj;
    item.raw = JSON.stringify(obj, null, 2);
    localStorage.setItem("ocrData", JSON.stringify(dataList));
    setTimeout(() => { alert("変更を保存しました"); renderList(); }, 100);
  };
}

/* Excelデータ出力機能 */
document.getElementById("excelBtn").onclick = () => {
  if (dataList.length === 0) { alert("データがありません"); return; }
  const rowsKakeibo = []; 
  const rowsReceipts = [];
  
  dataList.forEach(item => {
    if (item.type !== "receipt" || !item.json) return;
    const r = item.json;
    validateReceipt(r); 
    
    const date = r.date || ""; 
    const tNum = r.registration_number || "";
    let officialName = r.official_company_name || "";
    // エラー文字列はExcel出力時に除外または空白化する
    if (officialName.includes("【取得失敗】")) {
      officialName = "";
    }
    const storeRaw = r.store_name || "";
    
    let formattedStore = storeRaw;
    if (officialName && storeRaw) {
        formattedStore = `${officialName}（${storeRaw}）`;
    } else {
        formattedStore = officialName || storeRaw || "";
    }

    const pay = r.payment_method || ""; 
    const total = r.total_amount || 0; 
    const subtotal = r.subtotal_amount || 0; 
    const tax = r.tax_amount || 0;
    const rate = subtotal > 0 ? Math.round((tax / subtotal) * 1000) / 10 : "";
    
    const items = Array.isArray(r.items) ? r.items : [];
    items.forEach(it => { 
      rowsKakeibo.push({ 
        日付: date, 
        店名: formattedStore, 
        カテゴリ: it.category || "", 
        サブカテゴリ: it.subcategory || "", 
        品名: it.name || "", 
        数量: it.qty || 0, 
        単価: it.unit_price || 0, 
        小計: it.subtotal || 0, 
        支払い方法: pay, 
        合計金額: total, 
        メモ: "" 
      }); 
    });
    
    rowsReceipts.push({ 
      日付: date, 
      店名: formattedStore, 
      正式社名: officialName, 
      登録番号: tNum, 
      支払い方法: pay, 
      小計: subtotal, 
      税額: tax, 
      税率_推定: rate, 
      合計金額: total, 
      合計チェック: r.total_check ? "OK" : "NG" 
    });
  });

  if (rowsKakeibo.length === 0) { alert("レシートの有効なデータがありません"); return; }
  
  const wb = XLSX.utils.book_new();
  const wsK = XLSX.utils.json_to_sheet(rowsKakeibo); 
  XLSX.utils.book_append_sheet(wb, wsK, "家計簿");
  
  const wsR = XLSX.utils.json_to_sheet(rowsReceipts); 
  XLSX.utils.book_append_sheet(wb, wsR, "レシート");
  
  XLSX.writeFile(wb, "kakeibo_receipts.xlsx");
};

/* ZIP 一括保存機能 */
document.getElementById("zipBtn").onclick = async () => {
  if (dataList.length === 0) { alert("保存されたデータがありません"); return; }
  const zip = new JSZip();
  dataList.forEach((item, idx) => {
    const baseName = `${idx + 1}_${item.type}_${item.id}`;
    const folder = zip.folder(baseName);
    folder.file("data.txt", item.raw || "");
    if (item.json) { folder.file("data.json", JSON.stringify(item.json, null, 2)); }
    if (item.image && item.image.startsWith("data:image")) { const base64 = item.image.split(",")[1]; folder.file("image.jpg", base64, { base64: true }); }
  });
  const blob = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ocr_data.zip";
  a.click();
};

document.getElementById("clearBtn").onclick = () => {
  if (!confirm("すべてのデータを完全に削除しますか？")) return;
  localStorage.removeItem("ocrData");
  loadData();
};
