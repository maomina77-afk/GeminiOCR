<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Capture App</title>

<!-- Cropper.js -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<!-- JSZip（画像＋JSON ZIP用） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root {
  --primary: #007aff;
  --bg: #f2f2f7;
  --card-bg: #ffffff;
  --border-radius: 14px;
}
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg);
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--card-bg);
  padding: 12px 16px;
  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  font-weight: 600;
}
.main {
  padding: 12px;
  padding-bottom: 72px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 12px 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}
label {
  font-size: 13px;
  color: #555;
}
input[type="text"], input[type="file"], select {
  width: 100%;
  padding: 8px 10px;
  margin-top: 4px;
  margin-bottom: 8px;
  border-radius: 10px;
  border: 1px solid #d1d1d6;
  font-size: 14px;
  box-sizing: border-box;
}
button {
  border-radius: 999px;
  border: none;
  padding: 10px 16px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-block {
  width: 100%;
  margin-top: 6px;
}
#imageToCrop {
  width: 100%;
  max-height: 60vh;
  display: none;
  border-radius: 12px;
}
#cropArea {
  display: none;
}
#resultBox {
  white-space: pre-wrap;
  background: #f9f9fb;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  max-height: 40vh;
  overflow: auto;
}
.json-key { color: #1a73e8; font-weight: 600; }
.json-string { color: #d93025; }
.json-number { color: #188038; }
.json-boolean { color: #e37400; }
.json-null { color: #80868b; }

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--card-bg);
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 12px;
}
.nav-item {
  text-align: center;
  color: #8e8e93;
  text-decoration: none;
}
.nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.nav-item span {
  display: block;
}
</style>
</head>
<body>
<header>OCR Capture</header>

<div class="main">

  <!-- APIキー & 種別 -->
  <div class="card">
    <div class="card-title">設定</div>
    <label>Gemini API キー</label>
    <input type="text" id="apiKeyInput" placeholder="AIza...">
    <button class="btn-outline btn-block" id="saveApiKeyBtn">APIキーを保存</button>

    <label>ドキュメント種別</label>
    <select id="docType">
      <option value="receipt">レシート</option>
      <option value="business_card">名刺</option>
      <option value="license_plate">ナンバープレート</option>
    </select>
  </div>

  <!-- 画像入力 -->
  <div class="card">
    <div class="card-title">画像入力</div>
    <input type="file" id="fileInput" accept="image/*">
    <button class="btn-outline btn-block" id="cameraBtn">カメラで撮影</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
  </div>

  <!-- Cropper -->
  <div class="card" id="cropArea">
    <div class="card-title">トリミング</div>
    <img id="imageToCrop" src="">
    <button class="btn-primary btn-block" id="cropOkBtn">この範囲で OCR</button>
  </div>

  <!-- OCR 結果 -->
  <div class="card">
    <div class="card-title">OCR 結果</div>
    <div id="resultBox">まだ結果はありません。</div>
    <button class="btn-primary btn-block" id="saveBtn">この結果を保存</button>
  </div>

  <!-- 出力 -->
  <div class="card">
    <div class="card-title">出力</div>
    <button class="btn-outline btn-block" id="zipBtn">画像＋JSON を ZIP 出力</button>
  </div>

</div>

<!-- 下部ナビ -->
<div class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span>📷</span>
    <span>キャプチャ</span>
  </a>
  <a href="data.html" class="nav-item">
    <span>📂</span>
    <span>データ一覧</span>
  </a>
</div>

<script>
let cropper = null;
let lastImageDataUrl = null;

// APIキーのロード
const apiKeyInput = document.getElementById("apiKeyInput");
apiKeyInput.value = localStorage.getItem("geminiApiKey") || "";
document.getElementById("saveApiKeyBtn").onclick = () => {
  localStorage.setItem("geminiApiKey", apiKeyInput.value.trim());
  alert("APIキーを保存しました");
};

/* 画像選択 */
document.getElementById("fileInput").addEventListener("change", e => {
  loadImage(e.target.files[0]);
});
document.getElementById("cameraBtn").onclick = () => {
  document.getElementById("cameraInput").click();
};
document.getElementById("cameraInput").addEventListener("change", e => {
  loadImage(e.target.files[0]);
});

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("imageToCrop");
    img.src = e.target.result;
    lastImageDataUrl = e.target.result;
    img.style.display = "block";
    document.getElementById("cropArea").style.display = "block";
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, {
      aspectRatio: NaN,
      viewMode: 1
    });
  };
  reader.readAsDataURL(file);
}

/* OCR 実行 */
document.getElementById("cropOkBtn").onclick = async () => {
  if (!cropper) return;
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) {
    alert("先に APIキー を入力・保存してください。");
    return;
  }

  const canvas = cropper.getCroppedCanvas();
  const base64 = canvas.toDataURL("image/jpeg");
  lastImageDataUrl = base64;

  const docType = document.getElementById("docType").value;
  const text = await callGeminiOCR(base64, apiKey, docType);
  const json = extractJson(text);

  document.getElementById("resultBox").innerHTML = json
    ? highlightJson(JSON.stringify(json, null, 2))
    : "JSON を抽出できませんでした。\n\n" + text;
};

/* Gemini OCR（種別ごとにプロンプト最適化） */
function buildPrompt(docType) {
  if (docType === "receipt") {
    return `これはレシートの画像です。以下のような JSON だけを返してください。
{
  "type": "receipt",
  "store_name": "...",
  "date": "...",
  "total_amount": 1234,
  "items": [
    {"name": "...", "price": 123, "qty": 1}
  ]
}`;
  } else if (docType === "business_card") {
    return `これは名刺の画像です。以下のような JSON だけを返してください。
{
  "type": "business_card",
  "name": "...",
  "company": "...",
  "title": "...",
  "phone": "...",
  "email": "...",
  "address": "..."
}`;
  } else if (docType === "license_plate") {
    return `これは車のナンバープレートの画像です。以下のような JSON だけを返してください。
{
  "type": "license_plate",
  "region": "...",
  "class_number": "...",
  "hiragana": "...",
  "number": "...."
}`;
  }
  return "画像から情報を JSON だけで返してください。";
}

async function callGeminiOCR(base64, apiKey, docType) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
  const prompt = buildPrompt(docType);

  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inlineData: { mimeType: "image/jpeg", data: base64.split(",")[1] } }
      ]
    }]
  };

  const res = await fetch(url, {
    method: "POST",
    body: JSON.stringify(body)
  });

  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
}

/* JSON 抽出 */
function extractJson(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) return null;
  try {
    return JSON.parse(match[0]);
  } catch {
    return null;
  }
}

/* JSON 色付け */
function highlightJson(json) {
  return json
    .replace(/"(.*?)":/g, '<span class="json-key">"$1"</span>:')
    .replace(/"(.*?)"/g, '<span class="json-string">"$1"</span>')
    .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
    .replace(/\b(null)\b/g, '<span class="json-null">$1</span>')
    .replace(/\b([0-9]+)\b/g, '<span class="json-number">$1</span>');
}

/* 保存（画像＋JSONテキスト＋種別） */
document.getElementById("saveBtn").onclick = () => {
  const text = document.getElementById("resultBox").innerText;
  if (!text.trim()) return;

  const docType = document.getElementById("docType").value;
  const list = JSON.parse(localStorage.getItem("ocrData") || "[]");
  const id = Date.now().toString();
  list.push({
    id,
    type: docType,
    data: text,
    time: Date.now(),
    image: lastImageDataUrl || null
  });
  localStorage.setItem("ocrData", JSON.stringify(list));
  alert("保存しました");
};

/* 画像＋JSON ZIP 出力 */
document.getElementById("zipBtn").onclick = async () => {
  const list = JSON.parse(localStorage.getItem("ocrData") || "[]");
  if (list.length === 0) {
    alert("保存データがありません");
    return;
  }
  const zip = new JSZip();

  list.forEach((item, idx) => {
    const baseName = `${idx + 1}_${item.type}_${item.id}`;
    // JSONテキスト
    zip.file(`${baseName}.txt`, item.data || "");
    // 画像
    if (item.image && item.image.startsWith("data:image")) {
      const base64 = item.image.split(",")[1];
      zip.file(`${baseName}.jpg`, base64, { base64: true });
    }
  });

  const blob = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ocr_data.zip";
  a.click();
};
</script>
</body>
</html>
