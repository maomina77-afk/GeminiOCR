<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OCRキャプチャ（Gemini Flash）</title>
<style>
  body { font-family: sans-serif; padding: 10px; }
  #preview { max-width: 100%; margin-top: 10px; border: 1px solid #ccc; }
  #result { white-space: pre-wrap; font-size: 12px; background:#f7f7f7; padding:8px; }
  .tab { display: inline-block; padding: 8px 12px; border:1px solid #ccc; cursor:pointer; }
  .tab.active { background:#333; color:#fff; }
  .item { border:1px solid #ddd; padding:6px; margin:4px 0; font-size:12px; }

  #debugOutput { 
    white-space: pre-wrap; 
    font-size:12px; 
    background:#eef; 
    padding:8px; 
    margin-top:10px; 
    user-select:none; /* コピー禁止 */
  }
  #debugOutput[hidden] { display:none; }
  #debugHeader { cursor:pointer; user-select:none; }
</style>
</head>
<body>

<h2>OCRキャプチャ（レシート／名刺／ナンバー）</h2>

<!-- APIキー管理 -->
<h3>APIキー設定</h3>
<input id="apiKeyInput" type="password" placeholder="APIキーを入力">
<button id="saveApiKeyBtn">保存</button>
<button id="resetApiKeyBtn">再入力</button>
<div id="apiKeyStatus"></div>

<hr>

<!-- 撮影 -->
<input id="fileInput" type="file" accept="image/*" capture="environment"><br>
<img id="preview">

<button id="ocrBtn" disabled>OCR実行</button>

<h3>解析結果</h3>
<div id="result"></div>

<hr>

<!-- タブ -->
<div>
  <span class="tab active" data-tab="all">全件</span>
  <span class="tab" data-tab="receipt">レシート</span>
  <span class="tab" data-tab="business">名刺</span>
  <span class="tab" data-tab="plate">ナンバー</span>
</div>

<h3>保存データ</h3>
<div id="list"></div>

<hr>

<!-- デバッグモード -->
<label>
  <input type="checkbox" id="debugMode">
  デバッグモード（Gemini返答を表示）
</label>

<div id="debugHeader">▼ デバッグ出力（クリックで開閉）</div>
<div id="debugOutput" hidden></div>

<script>
/* ============================
   APIキー管理（暗号化保存）
============================ */
function encrypt(str) { return btoa(unescape(encodeURIComponent(str))); }
function decrypt(str) { return decodeURIComponent(escape(atob(str))); }

function loadApiKey() {
  const enc = localStorage.getItem("gemini_api_key");
  return enc ? decrypt(enc) : null;
}

function saveApiKey(key) {
  localStorage.setItem("gemini_api_key", encrypt(key));
}

function updateApiKeyStatus() {
  const key = loadApiKey();
  document.getElementById("apiKeyStatus").textContent =
    key ? "APIキー：設定済み（非表示）" : "APIキー：未設定";
}

document.getElementById("saveApiKeyBtn").onclick = () => {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key) return alert("APIキーを入力してください");
  saveApiKey(key);
  document.getElementById("apiKeyInput").value = "";
  updateApiKeyStatus();
};

document.getElementById("resetApiKeyBtn").onclick = () => {
  localStorage.removeItem("gemini_api_key");
  updateApiKeyStatus();
};

updateApiKeyStatus();

/* ============================
   デバッグ表示（コピー禁止・保存・折りたたみ・色分け）
============================ */
function highlightJson(rawText) {
  const match = rawText.match(/\{[\s\S]*\}/);
  if (!match) return rawText;

  const jsonPart = match[0];
  const before = rawText.slice(0, rawText.indexOf(jsonPart));
  const after = rawText.slice(rawText.indexOf(jsonPart) + jsonPart.length);

  return before + "\n" +
         "【JSON部分】\n" +
         jsonPart + "\n" +
         "【/JSON部分】\n" +
         after;
}

function showDebug(rawText, forceOn = false) {
  const debugCheckbox = document.getElementById("debugMode");
  if (forceOn) debugCheckbox.checked = true;

  const debugOn = debugCheckbox.checked;
  const box = document.getElementById("debugOutput");

  if (!debugOn) {
    box.hidden = true;
    return;
  }

  box.hidden = false;

  // コピー禁止
  box.oncopy = (e) => {
    e.preventDefault();
    alert("デバッグ内容のコピーは禁止しています");
  };

  // 空の場合は理由を表示
  if (!rawText || rawText.trim() === "") {
    rawText = "[Gemini からの返答が空です]\n" +
              "APIキーが無効、無料枠超過、またはネットワークエラーの可能性があります。";
  }

  // JSON部分を強調
  const text = highlightJson(rawText);
  box.textContent = text;

  // localStorage に保存
  const logs = JSON.parse(localStorage.getItem("debug_logs") || "[]");
  logs.unshift({ at: new Date().toISOString(), raw: rawText });
  localStorage.setItem("debug_logs", JSON.stringify(logs));
}

// 折りたたみ
document.getElementById("debugHeader").onclick = () => {
  const box = document.getElementById("debugOutput");
  box.hidden = !box.hidden;
};

/* ============================
   JSON抽出（完全版）
============================ */
function extractJson(text) {
  try {
    text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("JSONブロックが見つかりません");
    const jsonString = match[0];
    return JSON.parse(jsonString);
  } catch (e) {
    console.error("extractJson error:", e, "raw text:", text);
    showDebug(text, true); // 自動でデバッグON
    throw new Error("JSON抽出エラー");
  }
}

/* ============================
   Gemini返答の raw を安全に取得
============================ */
function getRawTextFromGemini(json) {
  try {
    if (json.error) {
      return "【Gemini API エラー】\n" + JSON.stringify(json.error, null, 2);
    }

    const parts = json.candidates?.[0]?.content?.parts;
    if (!parts) return "";

    let raw = "";
    for (const p of parts) {
      if (p.text) raw += p.text + "\n";
    }
    return raw.trim();
  } catch {
    return "";
  }
}

/* ============================
   OCRプロンプト
============================ */
const OCR_PROMPT = `
あなたは高精度OCRエンジンとして動作します。
以下の画像が「レシート」「名刺」「自動車ナンバープレート」「その他」のどれかを自動判別し、
種類に応じて最適な項目を抽出し、JSON形式で返してください。

【共通ルール】
- 読み取れた文字は可能な限りそのまま抽出
- 推測で補完しない
- 出力は必ず JSON のみ

【出力形式】
{
  "type": "receipt | business_card | license_plate | other",
  "raw_text": "",
  "receipt": { "store_name": "", "date": "", "total": "", "items": [] },
  "business_card": { "name": "", "company": "", "phone": "", "email": "" },
  "license_plate": { "region": "", "class_number": "", "hiragana": "", "number": "" }
}
`;

/* ============================
   画像リサイズ（1075px）
============================ */
const MAX_SIZE = 1075;
let currentBase64 = null;

document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const scale = Math.min(MAX_SIZE / img.width, MAX_SIZE / img.height, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
      currentBase64 = dataUrl.split(",")[1];

      document.getElementById("preview").src = dataUrl;
      document.getElementById("ocrBtn").disabled = false;
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

/* ============================
   Gemini Flash OCR（v1 正式版）
============================ */
async function analyzeImage(base64Image) {
  const API_KEY = loadApiKey();
  if (!API_KEY) {
    alert("APIキーが設定されていません");
    throw new Error("APIキー未設定");
  }

  const body = {
    contents: [
      {
        parts: [
          { text: OCR_PROMPT },
          { inlineData: { mimeType: "image/jpeg", data: base64Image } }
        ]
      }
    ]
  };

  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    }
  );

  const json = await res.json();

  // raw を安全に取得
  const raw = getRawTextFromGemini(json);

  // デバッグ表示
  showDebug(raw);

  return extractJson(raw);
}

/* ============================
   OCR実行
============================ */
document.getElementById("ocrBtn").onclick = async () => {
  if (!currentBase64) return;

  const btn = document.getElementById("ocrBtn");
  btn.disabled = true;
  btn.textContent = "解析中…";

  try {
    const data = await analyzeImage(currentBase64);
    document.getElementById("result").textContent = JSON.stringify(data, null, 2);

    saveRecord(data);
    renderList();
  } catch (e) {
    console.error(e);
    alert("解析に失敗しました：" + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "OCR実行";
  }
};

/* ============================
   保存（localStorage）
============================ */
function saveRecord(data) {
  const key = "ocr_records";
  const now = new Date().toISOString();
  const records = JSON.parse(localStorage.getItem(key) || "[]");
  records.unshift({ createdAt: now, data });
  localStorage.setItem(key, JSON.stringify(records));
}

/* ============================
   タブ切り替え
============================ */
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    renderList();
  };
});

/* ============================
   一覧表示（タブ別）
============================ */
function renderList() {
  const key = "ocr_records";
  const records = JSON.parse(localStorage.getItem(key) || "[]");
  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "";

  const activeTab = document.querySelector(".tab.active").dataset.tab;

  records.forEach((r, idx) => {
    const t = r.data.type;

    if (activeTab === "receipt" && t !== "receipt") return;
    if (activeTab === "business" && t !== "business_card") return;
    if (activeTab === "plate" && t !== "license_plate") return;

    const div = document.createElement("div");
    div.className = "item";

    let title = "";
    if (t === "receipt") {
      title = `${r.data.receipt.store_name} / ¥${r.data.receipt.total}`;
    } else if (t === "business_card") {
      title = r.data.business_card.name;
    } else if (t === "license_plate") {
      title = r.data.license_plate.number;
    } else {
      title = "その他";
    }

    div.innerHTML = `
      <div><b>${title}</b> (${r.createdAt})</div>
      <button data-idx="${idx}">詳細</button>
    `;
    listDiv.appendChild(div);
  });

  listDiv.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      const idx = Number(btn.dataset.idx);
      const recs = JSON.parse(localStorage.getItem("ocr_records") || "[]");
      document.getElementById("result").textContent = JSON.stringify(recs[idx].data, null, 2);
    };
  });
}

renderList();
</script>
</body>
</html>
