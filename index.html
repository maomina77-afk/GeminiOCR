<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Capture</title>

<!-- Cropper.js -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<!-- JSZip（画像＋JSON ZIP用） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root {
  --primary: #007aff;
  --bg: #f2f2f7;
  --card-bg: #ffffff;
  --radius: 14px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg);
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--card-bg);
  padding: 12px 16px;
  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  font-weight: 600;
}
.main {
  padding: 12px;
  padding-bottom: 72px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}
label {
  font-size: 13px;
  color: #555;
}
input[type="text"],
input[type="password"],
input[type="file"],
select {
  width: 100%;
  padding: 8px 10px;
  margin-top: 4px;
  margin-bottom: 8px;
  border-radius: 10px;
  border: 1px solid #d1d1d6;
  font-size: 14px;
}
#apiKeyInput {
  user-select: none;
}
button {
  border-radius: 999px;
  border: none;
  padding: 10px 16px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-block {
  width: 100%;
  margin-top: 6px;
}
#imageToCrop {
  width: 100%;
  max-height: 60vh;
  display: none;
  border-radius: 12px;
}
#cropArea {
  display: none;
}
#resultBox {
  white-space: pre-wrap;
  background: #f9f9fb;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  max-height: 40vh;
  overflow: auto;
}
.json-key { color: #1a73e8; font-weight: 600; }
.json-string { color: #d93025; }
.json-number { color: #188038; }
.json-boolean { color: #e37400; }
.json-null { color: #80868b; }
.warning {
  color: #ff3b30;
  font-size: 12px;
  margin-top: 4px;
}
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--card-bg);
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 12px;
}
.nav-item {
  text-align: center;
  color: #8e8e93;
  text-decoration: none;
}
.nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.nav-item span {
  display: block;
}
</style>
</head>
<body>
<header>OCR Capture</header>

<div class="main">

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">設定</div>
    <label>Gemini API キー</label>
    <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
    <button class="btn-outline btn-block" id="saveApiKeyBtn">APIキーを保存</button>

    <label>ドキュメント種別</label>
    <select id="docType">
      <option value="receipt">レシート</option>
      <option value="business_card">名刺</option>
      <option value="license_plate">ナンバープレート</option>
    </select>
  </div>

  <!-- 画像入力 -->
  <div class="card">
    <div class="card-title">画像入力</div>
    <input type="file" id="fileInput" accept="image/*">
    <button class="btn-outline btn-block" id="cameraBtn">カメラで撮影</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
  </div>

  <!-- Cropper -->
  <div class="card" id="cropArea">
    <div class="card-title">トリミング</div>
    <img id="imageToCrop" src="">
    <button class="btn-primary btn-block" id="cropOkBtn">この範囲で OCR</button>
  </div>

  <!-- OCR 結果 -->
  <div class="card">
    <div class="card-title">OCR 結果</div>
    <div id="resultBox">まだ結果はありません。</div>
    <div id="receiptWarning" class="warning"></div>
    <button class="btn-primary btn-block" id="saveBtn">この結果を保存</button>
  </div>

  <!-- 出力 -->
  <div class="card">
    <div class="card-title">出力</div>
    <button class="btn-outline btn-block" id="zipBtn">画像＋JSON を ZIP 出力</button>
  </div>

</div>

<!-- 下部ナビ -->
<div class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span>📷</span>
    <span>キャプチャ</span>
  </a>
  <a href="data.html" class="nav-item">
    <span>📂</span>
    <span>データ一覧</span>
  </a>
</div>

<script>
let cropper = null;
let lastImageDataUrl = null;
let lastParsedJson = null;

// 簡易暗号化（XOR＋Base64）
const KEY = "takahiro-receipt-key";

function xorEncrypt(str, key) {
  let res = "";
  for (let i = 0; i < str.length; i++) {
    res += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(res);
}
function xorDecrypt(enc, key) {
  try {
    const decoded = atob(enc);
    let res = "";
    for (let i = 0; i < decoded.length; i++) {
      res += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return res;
  } catch {
    return "";
  }
}

// APIキーのロード（再表示はしない）
const apiKeyInput = document.getElementById("apiKeyInput");
const storedKeyEnc = localStorage.getItem("geminiApiKeyEnc");
if (storedKeyEnc) {
  apiKeyInput.value = "********"; // 中身は見せない
}
apiKeyInput.addEventListener("copy", e => e.preventDefault());
apiKeyInput.addEventListener("cut", e => e.preventDefault());

document.getElementById("saveApiKeyBtn").onclick = () => {
  const val = apiKeyInput.value.trim();
  if (!val || val === "********") {
    alert("新しい APIキー を入力してください。");
    return;
  }
  const enc = xorEncrypt(val, KEY);
  localStorage.setItem("geminiApiKeyEnc", enc);
  apiKeyInput.value = "********";
  alert("APIキーを保存しました（再表示はできません）");
};

function getApiKey() {
  const enc = localStorage.getItem("geminiApiKeyEnc");
  if (!enc) return "";
  return xorDecrypt(enc, KEY);
}

/* 画像選択 */
document.getElementById("fileInput").addEventListener("change", e => {
  loadImage(e.target.files[0]);
});
document.getElementById("cameraBtn").onclick = () => {
  document.getElementById("cameraInput").click();
};
document.getElementById("cameraInput").addEventListener("change", e => {
  loadImage(e.target.files[0]);
});

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("imageToCrop");
    img.src = e.target.result;
    lastImageDataUrl = e.target.result;
    img.style.display = "block";
    document.getElementById("cropArea").style.display = "block";
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, {
      aspectRatio: NaN,
      viewMode: 1
    });
  };
  reader.readAsDataURL(file);
}

/* OCR 実行 */
document.getElementById("cropOkBtn").onclick = async () => {
  if (!cropper) return;
  const apiKey = getApiKey();
  if (!apiKey) {
    alert("先に APIキー を入力・保存してください。");
    return;
  }

  const canvas = cropper.getCroppedCanvas();
  const base64 = canvas.toDataURL("image/jpeg");
  lastImageDataUrl = base64;

  const docType = document.getElementById("docType").value;
  const text = await callGeminiOCR(base64, apiKey, docType);
  const json = extractJson(text);
  lastParsedJson = json;

  const resultBox = document.getElementById("resultBox");
  const warn = document.getElementById("receiptWarning");
  warn.textContent = "";

  if (json) {
    if (docType === "receipt") {
      const check = validateReceipt(json);
      if (!check.ok) {
        warn.textContent = "⚠ 合計金額が一致しません（計算値: " +
          check.calcTotal + " / JSON: " + json.total_amount + "）";
      }
      resultBox.innerHTML = highlightJson(JSON.stringify(json, null, 2));
    } else {
      resultBox.innerHTML = highlightJson(JSON.stringify(json, null, 2));
    }
  } else {
    resultBox.textContent = "JSON を抽出できませんでした。\n\n" + text;
  }
};

/* プロンプト生成 */
function buildReceiptPrompt() {
  return `あなたはレシート解析の専門家です。
以下の画像から情報を抽出し、次の JSON 形式だけを返してください。
余計な文章は一切書かないでください。

{
  "type": "receipt",
  "store_name": "",
  "date": "",
  "payment_method": "",
  "items": [
    {
      "name": "",
      "qty": 1,
      "unit_price": 0,
      "subtotal": 0,
      "category": "",
      "subcategory": ""
    }
  ],
  "subtotal_amount": 0,
  "tax_amount": 0,
  "total_amount": 0,
  "total_check": true
}

【抽出ルール】
- 店名は正式名称に正規化（例：セブンイレブン → Seven-Eleven）
- 日付は YYYY-MM-DD 形式に統一
- 支払い方法は推定（例：クレジットカード / PayPay / 現金）
- items[].subtotal = qty × unit_price
- subtotal_amount = items[].subtotal の合計
- total_check = (subtotal_amount + tax_amount == total_amount)

【カテゴリ分類ルール】
以下の分類を参考に最も適切なカテゴリとサブカテゴリを推定して記入してください。

■ 食品
- 生鮮
- 加工
- 飲料

■ 日用品
- 洗剤
- 紙類
- 雑貨

■ 外食
- ファストフード
- レストラン

■ その他の分類
- ガソリン
- 医療・薬
- 交通
- 娯楽
- 衣類
- 住居
- その他

【注意】
- JSON 以外の文章は絶対に書かない
- 読み取れない場合は空欄にする`;
}

function buildBusinessCardPrompt() {
  return `これは名刺の画像です。以下の JSON だけを返してください。

{
  "type": "business_card",
  "name": "",
  "company": "",
  "title": "",
  "phone": "",
  "email": "",
  "address": ""
}

JSON 以外の文章は書かないでください。`;
}

function buildLicensePlatePrompt() {
  return `これは日本車のナンバープレートの画像です。以下の JSON だけを返してください。

{
  "type": "license_plate",
  "region": "",
  "class_number": "",
  "hiragana": "",
  "number": ""
}

JSON 以外の文章は書かないでください。`;
}

function buildPrompt(docType) {
  if (docType === "receipt") return buildReceiptPrompt();
  if (docType === "business_card") return buildBusinessCardPrompt();
  if (docType === "license_plate") return buildLicensePlatePrompt();
  return "画像から情報を JSON だけで返してください。";
}

/* Gemini OCR */
async function callGeminiOCR(base64, apiKey, docType) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=" + apiKey;
  const prompt = buildPrompt(docType);

  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inlineData: { mimeType: "image/jpeg", data: base64.split(",")[1] } }
      ]
    }]
  };

  const res = await fetch(url, {
    method: "POST",
    body: JSON.stringify(body)
  });

  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
}

/* JSON 抽出 */
function extractJson(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) return null;
  try {
    return JSON.parse(match[0]);
  } catch {
    return null;
  }
}

/* JSON 色付け */
function highlightJson(json) {
  return json
    .replace(/"(.*?)":/g, '<span class="json-key">"$1"</span>:')
    .replace(/"(.*?)"/g, '<span class="json-string">"$1"</span>')
    .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
    .replace(/\b(null)\b/g, '<span class="json-null">$1</span>')
    .replace(/\b([0-9]+)\b/g, '<span class="json-number">$1</span>');
}

/* レシート検証 */
function validateReceipt(json) {
  if (!json.items || !Array.isArray(json.items)) return { ok: true, calcTotal: 0 };
  let subtotal = 0;
  json.items.forEach(it => {
    const qty = Number(it.qty || 0);
    const unit = Number(it.unit_price || 0);
    const sub = qty * unit;
    it.subtotal = sub;
    subtotal += sub;
  });
  json.subtotal_amount = subtotal;
  const tax = Number(json.tax_amount || 0);
  const total = Number(json.total_amount || 0);
  const calcTotal = subtotal + tax;
  json.total_check = (calcTotal === total);
  return { ok: json.total_check, calcTotal };
}

/* 保存（画像＋JSON＋種別） */
document.getElementById("saveBtn").onclick = () => {
  const text = document.getElementById("resultBox").innerText;
  if (!text.trim()) return;

  const docType = document.getElementById("docType").value;
  const list = JSON.parse(localStorage.getItem("ocrData") || "[]");
  const id = Date.now().toString();
  list.push({
    id,
    type: docType,
    json: lastParsedJson || null,
    raw: text,
    time: Date.now(),
    image: lastImageDataUrl || null
  });
  localStorage.setItem("ocrData", JSON.stringify(list));
  alert("保存しました");
};

/* 画像＋JSON ZIP 出力 */
document.getElementById("zipBtn").onclick = async () => {
  const list = JSON.parse(localStorage.getItem("ocrData") || "[]");
  if (list.length === 0) {
    alert("保存データがありません");
    return;
  }
  const zip = new JSZip();

  list.forEach((item, idx) => {
    const baseName = `${idx + 1}_${item.type}_${item.id}`;
    const folder = zip.folder(baseName);
    folder.file("data.txt", item.raw || "");
    if (item.json) {
      folder.file("data.json", JSON.stringify(item.json, null, 2));
    }
    if (item.image && item.image.startsWith("data:image")) {
      const base64 = item.image.split(",")[1];
      folder.file("image.jpg", base64, { base64: true });
    }
  });

  const blob = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ocr_data.zip";
  a.click();
};
</script>
</body>
</html>
